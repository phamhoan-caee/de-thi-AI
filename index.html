<script>
const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTD6ZzPWBa0HG24Av-JimMPQg3HTJklLOk89QogsshduBPsvz4xW0Qni82sRJQjuhqxr2E0OLMira03/pub?output=csv&gid=";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxelRvwR52I6AADASik5veHbMIoPUdFc9TkPE7rHbOiXENbgbxQui96lS3VqSUBE-TO/exec";

const myhoanghuy = "AIzaSyCLIebSQ4" + "Nh6c_hSBWE1G" + "hjIgSLEd0Itecc";

let allQuestions = [], selectedQuestions = [], studentAnswers = [];
let currentQuestionIndex = 0, timeLeft = 1200, timerInterval, isSubmitted = false;
let geminiCache = {};

window.onload = preloadQuestions;

/* ================= LOAD DATA ================= */
function preloadQuestions() {
    const gid = document.getElementById('jobType').value;

    Papa.parse(BASE_CSV_URL + gid, {
        download: true,
        header: true,
        skipEmptyLines: true,
        error: () => alert("Lỗi tải dữ liệu CSV!"),
        complete: function(results) {

            if (!results.data || results.data.length === 0) {
                alert("Không có dữ liệu câu hỏi!");
                return;
            }

            allQuestions = results.data
                .filter(i => i.CauHoi)
                .map(i => ({
                    question: i.CauHoi.trim(),
                    options: [i.A, i.B, i.C, i.D].map(x => x?.trim()).filter(Boolean),
                    answer: (i.DapAnDung || "").trim().toUpperCase(),
                    explanation: i.Giaithich || "Thực hiện đúng quy trình kỹ thuật.",
                    image: i["HINH ANH"] || ""
                }));
        }
    });
}

/* ================= START ================= */
function validateAndStart() {
    const name = studentName.value.trim();
    const dob = studentDOB.value.trim();
    const maThi = maThiInput.value.trim();

    if(!name || !dob || !maThi) return alert("Nhập đầy đủ thông tin!");
    if(allQuestions.length < 30) return alert("Chưa đủ dữ liệu câu hỏi!");

    startQuiz();
}

function startQuiz() {
    studentAnswers = [];
    geminiCache = {};
    isSubmitted = false;

    selectedQuestions = shuffle([...allQuestions]).slice(0, 30);

    displayName.innerText = studentName.value.toUpperCase();
    jobDisplayHeader.innerText = jobType.options[jobType.selectedIndex].text;

    startScreen.style.display = 'none';
    caeeHeader.style.display = 'flex';
    timer.style.display = 'block';
    quizScreen.style.display = 'grid';

    if(modeToggle.checked) aiContainer.style.display = 'flex';

    showQuestion(0);
    startTimer();
}

/* ================= SHUFFLE ================= */
function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

/* ================= SHOW QUESTION ================= */
function showQuestion(idx) {

    if (idx < 0 || idx >= selectedQuestions.length) return;

    currentQuestionIndex = idx;
    const q = selectedQuestions[idx];
    const stored = studentAnswers[idx];

    const labels = ['A','B','C','D'];
    const isPractice = modeToggle.checked;

    let html = `<h3>Câu ${idx+1}: ${q.question}</h3>`;

    if(q.image){
        html += `<img src="${q.image}" style="max-width:100%;margin:10px 0">`;
    }

    q.options.forEach((opt,i)=>{
        let cls = "";
        const isSelected = stored === i;

        if(isPractice && stored !== undefined){
            if(labels[i] === q.answer) cls = "correct";
            else if(isSelected) cls = "wrong";
            cls += " disabled";
        }
        else if(isSelected) cls = "selected";

        html += `
        <div class="option-item ${cls}" onclick="selectAns(${idx},${i})">
            <b>${labels[i]}.</b> ${opt}
        </div>`;
    });

    if(isPractice && stored !== undefined){
        html += `
        <div style="background:#fff3cd;padding:10px;margin-top:10px">
            <b>Gợi ý:</b> ${q.explanation}
        </div>

        <button id="gemini-btn-${idx}" class="btn-gemini"
            onclick="getGeminiExplanation(${idx})">
            ✨ Hỏi AI
        </button>

        <div id="gemini-box-${idx}" class="gemini-response-box"></div>`;
    }

    html += `
    <div style="margin-top:20px">
        <button onclick="showQuestion(${idx-1})">← Lùi</button>
        <button onclick="showQuestion(${idx+1})">Tiếp →</button>
    </div>`;

    quizContent.innerHTML = html;

    if(geminiCache[idx]){
        const box = document.getElementById(`gemini-box-${idx}`);
        box.innerHTML = geminiCache[idx];
        box.style.display = 'block';
    }

    renderGrid();
}

/* ================= SELECT ================= */
function selectAns(qIdx, ansIndex) {
    if(isSubmitted) return;

    studentAnswers[qIdx] = ansIndex;
    showQuestion(qIdx);
}

/* ================= GRID ================= */
function renderGrid(){
    navGrid.innerHTML = "";

    selectedQuestions.forEach((_,i)=>{
        const answered = studentAnswers[i] !== undefined;
        navGrid.innerHTML += `
        <div onclick="showQuestion(${i})"
        style="background:${answered?'#003399':'#fff'};color:${answered?'#fff':'#000'}">
        ${i+1}
        </div>`;
    });
}

/* ================= TIMER ================= */
function startTimer(){
    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
        timeLeft--;

        const m = Math.floor(timeLeft/60);
        const s = timeLeft % 60;

        timer.innerText = `${m}:${s<10?'0':''}${s}`;

        if(timeLeft <= 0) submitQuiz(true);

    },1000);
}

/* ================= SUBMIT ================= */
function submitQuiz(auto=false){

    if(!auto && !confirm("Nộp bài?")) return;

    clearInterval(timerInterval);
    isSubmitted = true;

    let score = 0;

    selectedQuestions.forEach((q,i)=>{
        const ansIndex = studentAnswers[i];
        const labels = ['A','B','C','D'];

        if(ansIndex !== undefined && labels[ansIndex] === q.answer){
            score++;
        }
    });

    resName.innerText = studentName.value.toUpperCase();
    resScore.innerText = score;

    resBadge.innerText = score >= 25 ? "ĐẠT" : "KHÔNG ĐẠT";
    resBadge.style.background = score >= 25 ? "green" : "red";

    resultScreen.style.display = 'flex';
}

/* ================= GEMINI ================= */
async function getGeminiExplanation(qIdx){

    if(geminiCache[qIdx]) return;

    const q = selectedQuestions[qIdx];
    const box = document.getElementById(`gemini-box-${qIdx}`);

    box.style.display = 'block';
    box.innerHTML = "Đang tải AI...";

    try{
        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${myhoanghuy}`,
            {
                method:"POST",
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    contents:[{
                        parts:[{
                            text:`Giải thích câu: ${q.question}. Đáp án đúng: ${q.answer}`
                        }]
                    }]
                })
            }
        );

        const data = await res.json();

        let text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

        if(!text) throw "AI không trả dữ liệu";

        geminiCache[qIdx] = text;
        box.innerHTML = text;

    }catch(e){
        box.innerHTML = "❌ Lỗi AI";
    }
}
</script>
